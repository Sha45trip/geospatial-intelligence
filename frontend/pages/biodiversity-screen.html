<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biodiversity Screen | Prudent Geospatial</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="../styles/main.css">
  <style>
    body { overflow: hidden; }
    #main-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    .bio-body { flex: 1; display: grid; grid-template-columns: 320px 1fr 340px; overflow: hidden; }
    
    .wizard-panel { background: white; border-right: 1px solid rgba(168,85,247,.12); display: flex; flex-direction: column; overflow-y: auto; }
    .wizard-header { padding: 16px 20px; border-bottom: 1px solid rgba(168,85,247,.12); }
    .wizard-title { font-size: 1rem; font-weight: 700; color: #1e1b4b; }
    .wizard-body { padding: 20px; flex: 1; display: flex; flex-direction: column; gap: 20px; }
    .step-label { font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #7c3aed; margin-bottom: 8px; }
    .coord-input { border: 1px solid rgba(168,85,247,.3); border-radius: 8px; padding: 8px 12px; font-size: .85rem; font-family: 'JetBrains Mono', monospace; width: 100%; }
    .pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill { padding: 5px 12px; border-radius: 999px; border: 1px solid rgba(168,85,247,.3); font-size: .8rem; font-weight: 600; cursor: pointer; background: white; transition: all .15s; }
    .pill.active { background: #9333ea; color: white; border-color: #9333ea; }
    
    .query-card { padding: 10px 12px; border: 1px solid rgba(168,85,247,.2); border-radius: 8px; cursor: pointer; background: #faf5ff; transition: all .15s; }
    .query-card.active { border-color: #9333ea; background: #f3e8ff; }
    .query-card h4 { font-size: .85rem; font-weight: 600; color: #1e1b4b; }
    .query-card p { font-size: .75rem; color: #6b7280; }

    .map-col { position: relative; }
    #bio-map { height: 100%; width: 100%; }
    .map-loader { position: absolute; inset: 0; z-index: 1000; background: rgba(255,255,255,.8); display: none; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #f3e8ff; border-top-color: #9333ea; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-panel { background: white; border-left: 1px solid rgba(168,85,247,.12); display: flex; flex-direction: column; }
    .results-header { padding: 16px 20px; border-bottom: 1px solid rgba(168,85,247,.12); }
    .results-body { flex: 1; overflow-y: auto; padding: 20px; }
    .result-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(168,85,247,.08); }
    .result-icon { width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .result-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 999px; font-size: .7rem; font-weight: 600; margin-top: 4px; }
    .rb-risk { background: #fee2e2; color: #dc2626; }
    .rb-clear { background: #d1fae5; color: #059669; }
  </style>
</head>
<body>
<div id="app-container">
  <aside id="sidebar"></aside>
  <div id="main-wrapper">
    <nav id="navbar"></nav>
    <div id="main-content">
      <div class="bio-body">
        <div class="wizard-panel">
          <div class="wizard-header"><div class="wizard-title">Screening Wizard</div></div>
          <div class="wizard-body">
            <div><div class="step-label">Step 1 — Location</div><div style="display:flex;gap:8px;"><input class="coord-input" id="lat-input" value="18.5204"><input class="coord-input" id="lng-input" value="73.8567"></div></div>
            <div><div class="step-label">Step 2 — Buffer</div><div class="pill-row"><button class="pill" onclick="setRadius(5,this)">5 km</button><button class="pill active" onclick="setRadius(10,this)">10 km</button><button class="pill" onclick="setRadius(25,this)">25 km</button></div></div>
            <div><div class="step-label">Step 3 — Query Type</div><div style="display:flex;flex-direction:column;gap:8px;"><div class="query-card active" onclick="setQuery(this,'A')"><h4>Query A — Intersection</h4><p>Does the buffer cross any zone?</p></div><div class="query-card" onclick="setQuery(this,'B')"><h4>Query B — Overlap %</h4><p>What % of buffer is in each zone?</p></div></div></div>
          </div>
          <div style="padding:20px;border-top:1px solid rgba(168,85,247,.12);"><button class="btn btn-primary" style="width:100%;" onclick="runScreening()">Run Screening</button></div>
        </div>

        <div class="map-col">
          <div id="bio-map"></div>
          <div class="map-loader" id="map-loader"><div class="spinner"></div><div style="font-weight:600;color:#1e1b4b;margin-top:10px;">Scanning Datasets…</div></div>
        </div>

        <div class="results-panel">
          <div class="results-header"><div class="wizard-title">Screening Insights</div></div>
          <div class="results-body" id="results-body"></div>
          <div style="padding:20px;border-top:1px solid rgba(168,85,247,.12);">
            <div class="step-label">Sensitivity Index</div>
            <div style="height:140px;position:relative;"><canvas id="sensitivityChart"></canvas></div>
            <button class="btn btn-outline" style="width:100%;margin-top:15px;" onclick="showToast('Report generated','success')"><i data-lucide="file-down" style="width:16px;height:16px;"></i> Download Report</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="../components/navbar.js"></script>
<script src="../components/sidebar.js"></script>
<script src="../components/mock-data.js"></script>
<script src="../components/map-panel.js"></script>
<script src="../components/toast.js"></script>
<script>
  let bioMap, bioLayers = {}, activeRadius = 10, activeQuery = 'A', sensitivityChart = null;

  function initMap() {
    bioMap = L.map('bio-map',{zoomControl:false,attributionControl:true}).setView([18.5204, 73.8567], 11);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(bioMap);
    ['buffer','protected','ramsar','kba','heritage','rivers'].forEach(k => bioLayers[k] = L.layerGroup().addTo(bioMap));
  }

  function setRadius(km,btn) { activeRadius = km; document.querySelectorAll('.pill').forEach(p=>p.classList.remove('active')); btn.classList.add('active'); }
  function setQuery(el,type) { activeQuery = type; document.querySelectorAll('.query-card').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }

  async function runScreening() {
    const lat = parseFloat(document.getElementById('lat-input').value), lng = parseFloat(document.getElementById('lng-input').value);
    document.getElementById('map-loader').style.display = 'flex';
    await new Promise(r => setTimeout(r, 1200));

    Object.values(bioLayers).forEach(l => l.clearLayers());
    L.circle([lat,lng],{radius:activeRadius*1000,color:'#9333ea',weight:2,dashArray:'5,10',fillOpacity:.05}).addTo(bioLayers.buffer);
    L.marker([lat,lng],{icon:L.divIcon({className:'',html:`<div style="width:20px;height:20px;background:#9333ea;border:3px solid white;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,.3);"></div>`})}).addTo(bioLayers.buffer);

    const datasets = [
      { key:'protected', label:'Protected Areas', color:'#059669', icon:'shield' },
      { key:'ramsar', label:'Ramsar Sites', color:'#2563eb', icon:'droplets' },
      { key:'kba', label:'KBA Zones', color:'#7c3aed', icon:'leaf' },
      { key:'heritage', label:'Heritage Sites', color:'#d97706', icon:'landmark' }
    ];

    const results = datasets.map(d => {
      const hit = Math.random() > 0.4;
      return { ...d, hit, score: hit ? Math.floor(Math.random()*40)+60 : Math.floor(Math.random()*30) };
    });

    document.getElementById('map-loader').style.display = 'none';
    renderResults(results);
    renderSensitivityChart(results);
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }

  function renderResults(results) {
    const body = document.getElementById('results-body');
    body.innerHTML = results.map(r => `
      <div class="result-item">
        <div class="result-icon" style="background:${r.hit ? '#fee2e2' : '#d1fae5'}"><i data-lucide="${r.icon}" style="color:${r.color};width:18px;height:18px;"></i></div>
        <div>
          <div style="font-size:.85rem;font-weight:600;color:#1e1b4b;">${r.label}</div>
          <div style="font-size:.75rem;color:#6b7280;">${r.hit ? 'Intersection Detected' : 'No Overlap Found'}</div>
          <span class="result-badge ${r.hit ? 'rb-risk' : 'rb-clear'}">${r.hit ? 'High Risk' : 'Clear'}</span>
        </div>
      </div>`).join('');
  }

  function renderSensitivityChart(results) {
    const ctx = document.getElementById('sensitivityChart').getContext('2d');
    if (sensitivityChart) sensitivityChart.destroy();
    sensitivityChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: results.map(r => r.label),
        datasets: [{ data: results.map(r => r.score), backgroundColor: results.map(r => r.color), borderWeight: 0 }]
      },
      options: { cutout: '70%', plugins: { legend: { display: false } }, maintainAspectRatio: false }
    });
  }

  document.addEventListener('DOMContentLoaded', () => { initMap(); runScreening(); });
</script>
</body>
</html>
